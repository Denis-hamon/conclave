<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>◆ Conclave Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --border: #1e1e1e;
      --text: #e6e6e6;
      --dim: #8a8a8a;
      --accent: #f97316;
      --green: #22c55e;
      --role-1: #60a5fa;
      --role-2: #c084fc;
      --role-3: #facc15;
      --role-4: #34d399;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      height: 100vh; overflow: hidden;
    }
    .topbar {
      height: 48px; padding: 0 20px; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .topbar .title { font-weight: 600; letter-spacing: .02em; }
    .topbar .title span { color: var(--accent); }
    .topbar .live { color: var(--green); display: flex; align-items: center; gap: 6px; }
    .topbar .live::before {
      content: ""; width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); animation: pulse 1.6s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .3 } }

    .grid {
      display: grid;
      grid-template-columns: 320px 1fr 360px;
      height: calc(100vh - 48px);
    }
    .panel {
      border-right: 1px solid var(--border);
      padding: 16px 20px; overflow-y: auto;
    }
    .panel:last-child { border-right: none; }
    .panel h2 {
      margin: 0 0 14px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .1em; color: var(--dim);
    }

    /* Org tree */
    #org-tree { font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
    .org-node {
      padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
      margin: 4px 0; display: flex; justify-content: space-between; align-items: center;
      background: var(--surface);
    }
    .org-node .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--dim);
    }
    .org-node.active .dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .org-indent { padding-left: 16px; border-left: 1px dashed var(--border); margin-left: 10px; }

    /* Trail */
    .trail { display: flex; flex-direction: column; gap: 10px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
    .trail-entry {
      border: 1px solid var(--border); background: var(--surface);
      border-radius: 6px; padding: 10px 12px;
      animation: fadein .4s ease-out;
    }
    @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .trail-entry .ts { color: var(--dim); font-size: 10px; }
    .trail-entry .hdr { margin: 4px 0; font-weight: 600; }
    .trail-entry .content { white-space: pre-wrap; color: var(--text); }
    .trail-entry .reasoning { font-style: italic; color: var(--dim); margin-top: 6px; font-size: 11px; }

    .filter-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .filter-row button {
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      border-radius: 4px; padding: 4px 10px; font-size: 11px; cursor: pointer;
      font-family: inherit;
    }
    .filter-row button.active { border-color: var(--accent); color: var(--accent); }

    /* Cost & status */
    .cost-table { width: 100%; font-family: 'IBM Plex Mono', monospace; font-size: 12px; border-collapse: collapse; }
    .cost-table td { padding: 4px 0; }
    .cost-table td.val { text-align: right; }
    .cost-table tr.sep td { border-top: 1px solid var(--border); padding-top: 6px; }
    .cost-table tr.total td { font-weight: 600; color: var(--accent); }

    .progress {
      height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 6px;
    }
    .progress > div { height: 100%; background: var(--accent); transition: width .4s ease; }

    .cert-row {
      display: flex; justify-content: space-between; padding: 5px 0;
      font-family: 'IBM Plex Mono', monospace; font-size: 12px;
      border-bottom: 1px solid var(--border);
    }
    .cert-row .badge.cert { color: var(--green); }
    .cert-row .badge.cond { color: var(--accent); }
    .cert-row .badge.rej  { color: #ef4444; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">◆ <span>Conclave</span> Dashboard</div>
    <div class="live">live</div>
  </div>

  <div class="grid">
    <section class="panel">
      <h2>Org Graph</h2>
      <div id="org-tree">Loading…</div>
    </section>

    <section class="panel">
      <h2>Decision Trail</h2>
      <div class="filter-row" id="filters">
        <button data-f="all" class="active">All</button>
        <button data-f="delegation">Delegation</button>
        <button data-f="handoff">Handoff</button>
        <button data-f="escalation">Escalation</button>
        <button data-f="output">Output</button>
      </div>
      <div class="trail" id="trail">Loading…</div>
    </section>

    <section class="panel">
      <h2>Cost &amp; Status</h2>
      <table class="cost-table" id="cost">
        <tbody>
          <tr><td colspan="2" style="color: var(--dim);">Loading…</td></tr>
        </tbody>
      </table>

      <h2 style="margin-top: 20px;">Certified workload share</h2>
      <div class="progress"><div id="share" style="width: 0%"></div></div>
      <div id="share-label" style="font-size: 11px; color: var(--dim); margin-top: 4px;">—</div>

      <h2 style="margin-top: 20px;">Certifications</h2>
      <div id="certs">—</div>
    </section>
  </div>

<script>
const ROLE_COLORS = ['var(--role-1)','var(--role-2)','var(--role-3)','var(--role-4)'];
const state = { roleColor: {}, filter: 'all', activeRoles: new Set() };

async function fetchJSON(url) {
  const r = await fetch(url);
  return r.json();
}

function renderOrg(org) {
  const roles = org.agents.map(a => a.role);
  roles.forEach((r, i) => state.roleColor[r] = ROLE_COLORS[i % ROLE_COLORS.length]);

  const byParent = {};
  for (const a of org.agents) {
    const p = a.reports_to || '__root__';
    (byParent[p] = byParent[p] || []).push(a);
  }
  const html = [];
  function walk(parent, depth) {
    const kids = byParent[parent] || [];
    for (const a of kids) {
      const color = state.roleColor[a.role];
      const active = state.activeRoles.has(a.role) ? 'active' : '';
      html.push(`<div class="${depth>0?'org-indent':''}">`);
      html.push(`<div class="org-node ${active}" data-role="${a.role}">
        <span style="color:${color}">${a.role}</span>
        <span class="dot"></span>
      </div>`);
      walk(a.role, depth+1);
      html.push(`</div>`);
    }
  }
  walk('__root__', 0);
  document.getElementById('org-tree').innerHTML = html.join('');
}

function renderTrail(entries) {
  const filtered = state.filter === 'all' ? entries : entries.filter(e => (e.type || '') === state.filter);
  const html = filtered.map(e => {
    const fromColor = state.roleColor[e.from] || '#fff';
    const toColor   = state.roleColor[e.to]   || '#fff';
    const preview = (e.content || '').slice(0, 500);
    return `<div class="trail-entry">
      <div class="ts">${e.ts || ''}</div>
      <div class="hdr">
        <span style="color:${fromColor}">${e.from}</span>
        <span style="color: var(--dim)"> → </span>
        <span style="color:${toColor}">${e.to}</span>
        <span style="color: var(--dim); font-weight: 400; margin-left: 8px;">${e.type || ''}</span>
      </div>
      <div class="content">${escapeHtml(preview)}</div>
      ${e.reasoning ? `<div class="reasoning">↳ ${escapeHtml(e.reasoning)}</div>` : ''}
    </div>`;
  }).join('');
  document.getElementById('trail').innerHTML = html || '<div style="color: var(--dim); font-size: 12px;">No trail yet. Run: conclave run "your goal" --dry-run</div>';
  document.getElementById('trail').scrollTop = 99999;
}

function escapeHtml(s) {
  return (s||'').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;" }[c]));
}

function renderStatus(s) {
  const haiku = 0, sonnet = 0; // placeholder — token-level breakdown needs richer trail format
  const html = `
    <tr><td>Haiku</td><td class="val">$${haiku.toFixed(4)}</td></tr>
    <tr><td>Sonnet</td><td class="val">$${sonnet.toFixed(4)}</td></tr>
    <tr class="sep total"><td>Total</td><td class="val">$${s.total_cost_usd.toFixed(4)}</td></tr>
    <tr><td style="color: var(--dim)">Baseline (all-Sonnet)</td><td class="val" style="color: var(--dim)">$${s.baseline_cost_usd.toFixed(4)}</td></tr>
    <tr><td style="color: var(--green)">Saved</td><td class="val" style="color: var(--green)">${s.savings_pct.toFixed(1)}%</td></tr>
  `;
  document.getElementById('cost').querySelector('tbody').innerHTML = html;

  document.getElementById('share').style.width = `${s.certified_share_pct}%`;
  document.getElementById('share-label').innerText = `${s.certified_share_pct}% of task types certified`;

  const certs = s.certifications || [];
  document.getElementById('certs').innerHTML = certs.length
    ? certs.map(c => `<div class="cert-row">
        <span>${c.role || ''} / ${c.task_type || ''}</span>
        <span class="badge ${c.status==='certified'?'cert':c.status==='conditional'?'cond':'rej'}">${
          c.status==='certified'?'✓':c.status==='conditional'?'~':'✗'
        } ${(c.status||'').toUpperCase()}</span>
      </div>`).join('')
    : '<div style="color: var(--dim); font-size: 11px;">No certifications yet. Run: conclave simulate &amp;&amp; conclave certify</div>';
}

async function refresh() {
  try {
    const [org, trail, status] = await Promise.all([
      fetchJSON('/api/org'),
      fetchJSON('/api/trail'),
      fetchJSON('/api/status'),
    ]);
    state.activeRoles = new Set(trail.trail.map(e => e.from));
    renderOrg(org);
    renderTrail(trail.trail);
    renderStatus(status);
  } catch (e) { console.error(e); }
}

document.getElementById('filters').addEventListener('click', (e) => {
  const btn = e.target.closest('button'); if (!btn) return;
  state.filter = btn.dataset.f;
  for (const b of e.currentTarget.querySelectorAll('button')) b.classList.toggle('active', b === btn);
  refresh();
});

refresh();
setInterval(refresh, 2000);

// SSE for real-time entries
try {
  const ev = new EventSource('/api/events');
  ev.onmessage = () => refresh();
} catch (e) { /* SSE optional */ }
</script>
</body>
</html>
